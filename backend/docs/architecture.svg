<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#eee" font-size="24" font-family="Arial" font-weight="bold">
    Commitment Score App Architecture
  </text>
  
  <!-- Client Layer -->
  <rect x="300" y="60" width="200" height="60" fill="#4a4a6a" stroke="#6a6a8a" stroke-width="2" rx="8"/>
  <text x="400" y="95" text-anchor="middle" fill="#fff" font-size="14" font-family="Arial">Client (Browser)</text>
  
  <!-- Arrow to Frontend -->
  <line x1="400" y1="120" x2="400" y2="150" stroke="#6a6a8a" stroke-width="2"/>
  <polygon points="400,150 395,140 405,140" fill="#6a6a8a"/>
  <text x="410" y="140" fill="#888" font-size="12" font-family="Arial">HTTP/HTTPS</text>
  
  <!-- Frontend Layer -->
  <rect x="50" y="150" width="700" height="100" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="8"/>
  <text x="400" y="175" text-anchor="middle" fill="#e94560" font-size="16" font-family="Arial" font-weight="bold">Frontend - Next.js 14</text>
  
  <!-- Frontend Components -->
  <rect x="80" y="190" width="140" height="40" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="150" y="215" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial">Pages/Routes</text>
  
  <rect x="240" y="190" width="140" height="40" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="310" y="215" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial">Components</text>
  
  <rect x="400" y="190" width="140" height="40" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="470" y="215" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial">React Hooks</text>
  
  <rect x="560" y="190" width="140" height="40" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="630" y="215" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial">Tailwind CSS</text>
  
  <text x="400" y="240" text-anchor="middle" fill="#888" font-size="12" font-family="Arial">Port: 3000</text>
  
  <!-- Arrow to Backend -->
  <line x1="400" y1="250" x2="400" y2="280" stroke="#6a6a8a" stroke-width="2"/>
  <polygon points="400,280 395,270 405,270" fill="#6a6a8a"/>
  <text x="410" y="270" fill="#888" font-size="12" font-family="Arial">REST API</text>
  
  <!-- Backend Layer -->
  <rect x="50" y="280" width="700" height="140" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="8"/>
  <text x="400" y="305" text-anchor="middle" fill="#e94560" font-size="16" font-family="Arial" font-weight="bold">Backend - FastAPI</text>
  
  <!-- API Routers -->
  <rect x="80" y="320" width="300" height="80" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="230" y="340" text-anchor="middle" fill="#fff" font-size="12" font-family="Arial" font-weight="bold">API Routers</text>
  <text x="230" y="360" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial">Auth | Users | Goals</text>
  <text x="230" y="375" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial">Contributions | Withdrawals</text>
  <text x="230" y="390" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial">Payments | Transactions | Webhooks</text>
  
  <!-- Core Services -->
  <rect x="400" y="320" width="140" height="80" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="470" y="345" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial" font-weight="bold">Auth Service</text>
  <text x="470" y="365" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial">JWT + Bcrypt</text>
  <text x="470" y="385" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial">Password Hashing</text>
  
  <rect x="560" y="320" width="140" height="80" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="630" y="345" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial" font-weight="bold">Scoring Service</text>
  <text x="630" y="365" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial">Algorithm</text>
  <text x="630" y="385" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial">Base: 50 | Max: 100</text>
  
  <text x="400" y="410" text-anchor="middle" fill="#888" font-size="12" font-family="Arial">Port: 8000 | API Docs: /docs</text>
  
  <!-- Arrow to Database -->
  <line x1="400" y1="420" x2="400" y2="450" stroke="#6a6a8a" stroke-width="2"/>
  <polygon points="400,450 395,440 405,440" fill="#6a6a8a"/>
  <text x="410" y="440" fill="#888" font-size="12" font-family="Arial">SQLAlchemy ORM</text>
  
  <!-- Database Layer -->
  <rect x="200" y="450" width="400" height="120" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="8"/>
  <text x="400" y="475" text-anchor="middle" fill="#e94560" font-size="16" font-family="Arial" font-weight="bold">Database - PostgreSQL 15</text>
  
  <!-- Database Tables -->
  <rect x="230" y="490" width="70" height="60" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="265" y="510" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial" font-weight="bold">users</text>
  <text x="265" y="530" text-anchor="middle" fill="#aaa" font-size="9" font-family="Arial">id, username</text>
  <text x="265" y="542" text-anchor="middle" fill="#aaa" font-size="9" font-family="Arial">email, password</text>
  
  <rect x="320" y="490" width="70" height="60" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="355" y="510" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial" font-weight="bold">goals</text>
  <text x="355" y="530" text-anchor="middle" fill="#aaa" font-size="9" font-family="Arial">id, user_id</text>
  <text x="355" y="542" text-anchor="middle" fill="#aaa" font-size="9" font-family="Arial">description</text>
  
  <rect x="410" y="490" width="70" height="60" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="445" y="510" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial" font-weight="bold">contribs</text>
  <text x="445" y="530" text-anchor="middle" fill="#aaa" font-size="9" font-family="Arial">id, user_id</text>
  <text x="445" y="542" text-anchor="middle" fill="#aaa" font-size="9" font-family="Arial">amount, on_time</text>
  
  <rect x="500" y="490" width="70" height="60" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="535" y="510" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial" font-weight="bold">withdrawals</text>
  <text x="535" y="530" text-anchor="middle" fill="#aaa" font-size="9" font-family="Arial">id, user_id</text>
  <text x="535" y="542" text-anchor="middle" fill="#aaa" font-size="9" font-family="Arial">amount, approved</text>
  
  <text x="400" y="560" text-anchor="middle" fill="#888" font-size="12" font-family="Arial">Port: 5432 | DB: commitment_score</text>
  
  <!-- Scoring Formula Box -->
  <rect x="50" y="490" width="140" height="80" fill="#2d1f3d" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="120" y="510" text-anchor="middle" fill="#e94560" font-size="11" font-family="Arial" font-weight="bold">Score Formula</text>
  <text x="120" y="530" text-anchor="middle" fill="#aaa" font-size="9" font-family="Arial">Base: 50</text>
  <text x="120" y="545" text-anchor="middle" fill="#aaa" font-size="9" font-family="Arial">+ Contributions: +2× (max 20)</text>
  <text x="120" y="560" text-anchor="middle" fill="#aaa" font-size="9" font-family="Arial">+ Goals: +10× (max 30)</text>
  <text x="120" y="575" text-anchor="middle" fill="#aaa" font-size="9" font-family="Arial">- Withdrawals: -15×</text>
  
  <!-- Legend -->
  <rect x="620" y="490" width="130" height="80" fill="#2d1f3d" stroke="#6a6a8a" stroke-width="1" rx="4"/>
  <text x="685" y="510" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial" font-weight="bold">Legend</text>
  <text x="685" y="530" text-anchor="middle" fill="#888" font-size="9" font-family="Arial">Blue = Application</text>
  <text x="685" y="545" text-anchor="middle" fill="#888" font-size="9" font-family="Arial">Red = Service Name</text>
  <text x="685" y="560" text-anchor="middle" fill="#888" font-size="9" font-family="Arial">Gray = Details</text>
</svg>
