services:
  # Frontend Static Site (Next.js)
  - type: web
    name: commitment-score-frontend
    env: static
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    staticPublishPath: ./out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
